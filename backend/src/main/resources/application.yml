spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_trade
    username: postgres
    password: your_password_here
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
